kind = "web"
previewPath = "/"
title = "House Floor Plan Generator"
version = "1.0.0"
id = "artifacts/house-planner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19914

[services.development]
run = "pnpm --filter @workspace/house-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/house-planner", "run", "build" ]
publicDir = "artifacts/house-planner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19914"
BASE_PATH = "/"

[[services]]
name = "api"
paths = [ "/api" ]
localPort = 8080

[services.development]
run = "PORT=8080 pnpm --filter @workspace/api-server run dev"

[services.production.build]
args = [ "pnpm", "--filter", "@workspace/api-server", "run", "build" ]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = [ "node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs" ]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"

[services.env]
PORT = "8080"
